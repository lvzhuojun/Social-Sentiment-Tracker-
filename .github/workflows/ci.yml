name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Install lint tools
        run: pip install flake8

      - name: Lint with flake8
        run: flake8 src/ app/ config.py

      # ── Test dependencies ────────────────────────────────────────────────────
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov
          # Core data science
          pip install "numpy>=1.24.0,<2.0.0" "pandas>=2.0.0" "scikit-learn>=1.3.0"
          # NLP helpers (no GPU torch in CI — use CPU build)
          pip install nltk wordcloud
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "transformers>=4.35.0"
          # Visualisation
          pip install matplotlib seaborn "plotly>=5.18.0"
          # Web demo + serialisation
          pip install "streamlit>=1.28.0" joblib tqdm

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
